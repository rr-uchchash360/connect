<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Connect with Md. Rafiur Rahman — software engineer, CSCA™.">
  <title>Rafiur · Link Heaven</title>
  
  <!-- Favicon (SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230071e3'/%3E%3Cpath d='M38 60L28 50a10 10 0 0114-14l10 10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M62 40l10 10a10 10 0 01-14 14l-10-10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for fallback / non-social icons (phone, email, etc) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* ------------------------- DESIGN SYSTEM (GLASS + IOS) — REFINED & COMPACT ------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient-start: #f0f2f5;
      --bg-gradient-end: #dae0e9;
      --glass-bg: rgba(255, 255, 255, 0.38);
      --glass-border: rgba(255, 255, 255, 0.55);
      --glass-shadow: 0 20px 40px -8px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.03);
      --text-primary: #1c1c1e;
      --text-secondary: #3a3a3c;
      --accent: #0077ed;
      --accent-soft: #0066d9;
      --blur-amount: 22px;
      --card-radius: 32px;
      --item-radius: 20px;
      --transition: all 0.25s cubic-bezier(0.2, 0.0, 0.0, 1.0);
    }

    [data-theme="dark"] {
      --bg-gradient-start: #0b0b12;
      --bg-gradient-end: #181a24;
      --glass-bg: rgba(30, 32, 40, 0.48);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 4px 10px rgba(0, 0, 0, 0.2);
      --text-primary: #f5f5f7;
      --text-secondary: #acacb5;
      --accent: #0a84ff;
      --accent-soft: #3f9eff;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 30% 10%, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      color: var(--text-primary);
      transition: background 0.3s ease;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,130,255,0.1), rgba(100,120,255,0.02));
      filter: blur(70px);
      opacity: 0.45;
    }
    .blob1 { top: -10vh; left: -10vw; background: rgba(0,113,227,0.15); }
    .blob2 { bottom: -5vh; right: -5vw; width: 70vmax; height: 70vmax; background: rgba(120,80,255,0.1); }
    .blob3 { top: 30vh; left: 40vw; width: 40vmax; height: 40vmax; background: rgba(255,140,200,0.06); }

    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ---------- GLASS CARD — reduced padding for compactness ---------- */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-amount)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--glass-shadow);
      padding: clamp(20px, 5vw, 28px) clamp(16px, 5vw, 24px);
      transition: background 0.25s, border-color 0.2s;
    }

    /* ---------- PROFILE (compact) ---------- */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 16px;
    }
    .avatar-wrapper {
      position: relative;
      width: fit-content;
      margin-bottom: 10px;
    }
    .avatar-frame {
      width: clamp(96px, 22vw, 112px);
      height: clamp(96px, 22vw, 112px);
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(145deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
      box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.5);
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #cbd5e1;
      border: 2px solid rgba(255,255,255,0.5);
    }

    /* 🇧🇩 STATIC BANGLADESH FLAG BADGE — no animation, accurate design */
    .flag-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: clamp(34px, 9vw, 42px);
      aspect-ratio: 3 / 2;
      background: transparent;
      border-radius: 4px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18), 0 0 0 1.5px rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transform: translate(10%, 10%);
      overflow: hidden;
      border: 0.5px solid var(--glass-border);
    }
    .flag-svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .name {
      font-size: clamp(1.7rem, 6vw, 2rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-soft));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 4px;
    }
    .tagline {
      display: inline-block;
      background: rgba(127,127,128,0.12);
      backdrop-filter: blur(10px);
      padding: 3px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      border: 0.5px solid var(--glass-border);
    }

    /* section titles — tighter */
    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      margin-top: 20px;
    }

    /* CONTACT LIST — reduced vertical gap */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.05); /* glassy neutral */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.8px solid rgba(255, 255, 255, 0.25);
      border-radius: 18px;
      padding: 10px 16px;
      text-decoration: none;
      color: var(--text-primary); /* use theme-aware primary color */
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
    }

/* Light mode — subtle grey background, visible border */
.contact-item .contact-left .icon-bg {
  background: rgba(200, 200, 200, 0.2); /* light grey tint */
  border: 0.5px solid rgba(0, 0, 0, 0.1); /* soft black border */
  color: var(--text-primary);
  transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
}

/* Dark mode — white background for icons, subtle border */
[data-theme="dark"] .contact-item .contact-left .icon-bg {
  background: rgba(255, 255, 255, 0.12); /* light glassy white */
  border: 0.5px solid rgba(255, 255, 255, 0.25); /* visible in dark */
  color: #fff; /* icon itself white in dark mode */
}

/* Hover effect — icon shows original accent color */
.contact-item:hover .icon-bg {
  color: var(--accent);
}

    /* Hover state: show accent color */
    .contact-item:hover {
      background: rgba(0, 113, 227, 0.15); /* subtle accent highlight */
      border-color: var(--accent);
      color: var(--accent); /* text color on hover */
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -6px rgba(0, 0, 0, 0.12), 0 0 0 2px rgba(0, 113, 227, 0.15);
    }

    .contact-item:hover .icon-bg {
      color: var(--accent); /* icon color on hover */
      border-color: var(--accent);
    }
    .contact-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icon-bg {
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.2rem;
      border: 0.5px solid rgba(0,113,227,0.25);
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .contact-label {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .contact-detail {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .chevron {
      font-size: 1.4rem;
      opacity: 0.5;
      transition: transform 0.2s, opacity 0.2s;
    }
    .contact-item:hover .chevron {
      transform: translateX(4px);
      opacity: 1;
    }

    /* ---------- SOCIAL ROW (ICON ONLY, STRICT SINGLE ROW) ---------- */
    .social-row {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: space-evenly;
      align-items: center;
      gap: clamp(10px, 3vw, 24px);
      margin: 0px 0 8px;
    }
    .social-icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: clamp(48px, 12vw, 60px);
      height: clamp(48px, 12vw, 60px);
      text-decoration: none;
      color: var(--text-primary);
      transition: var(--transition);
      box-shadow: 0 6px 12px rgba(0,0,0,0.04);
      flex-shrink: 0;
    }
    .social-icon-link:hover {
      transform: scale(1.08) translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 16px 24px -8px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.25);
    }
    .social-icon-link:active {
      transform: scale(0.98);
    }
    .social-icon-svg {
      width: 60%;
      height: 60%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-icon-svg svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
      transition: fill 0.15s;
    }

    /* brand color hints on hover */
    .social-icon-link[data-brand="facebook"]:hover { color: #1877f2; }
    .social-icon-link[data-brand="instagram"]:hover { color: #e4405f; }
    .social-icon-link[data-brand="linkedin"]:hover { color: #0a66c2; }
    .social-icon-link[data-brand="x"]:hover { color: #111; }
    [data-theme="dark"] .social-icon-link[data-brand="x"]:hover { color: #e7e9ea; }

    /* FOOTER */
    .footer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 0.5px solid var(--glass-border);
    }
    .theme-switch {
      display: flex;
      gap: 5px;
      background: rgba(120,120,128,0.12);
      padding: 3px;
      border-radius: 100px;
      backdrop-filter: blur(8px);
    }
    .theme-btn {
      border: none;
      background: transparent;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 590;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .theme-btn.active {
      background: rgba(255,255,255,0.6);
      color: var(--text-primary);
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    [data-theme="dark"] .theme-btn.active {
      background: rgba(50,52,60,0.9);
    }
    .copyright {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    /* mobile footer */
    @media (max-width: 500px) {
      body { padding: 10px; align-items: flex-start; }
      .glass-panel { padding: 18px 14px; }
      .footer-actions {
        flex-direction: column;
        gap: 12px;
      }
      .theme-switch {
        width: 80%;
        margin: 0 auto;
        justify-content: center;
      }
      .copyright {
        text-align: center;
        order: 2;
      }
      .theme-switch { order: 1; }
      .theme-btn {
        flex: 1 1 0;
        text-align: center;
        padding: 6px 6px;
      }
      /* ensure social icons stay in one row & don't overflow */
      .social-row {
        gap: 8px;
      }
      .social-icon-link {
        width: clamp(44px, 13vw, 52px);
        height: clamp(44px, 13vw, 52px);
      }
    }

    @media (min-width: 501px) {
      .footer-actions { flex-direction: row; }
      .theme-switch { margin-right: auto; }
    }

    /* focus */
    .contact-item:focus-visible, .social-icon-link:focus-visible, .theme-btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div id="app">
    <div class="glass-panel">
      <!-- PROFILE + STATIC FLAG -->
      <div class="profile">
        <div class="avatar-wrapper">
          <div class="avatar-frame">
            <img class="avatar" :src="profile.avatar" :alt="profile.name" @error="handleAvatarError">
          </div>
          <!-- Static Bangladesh flag badge (inline SVG, accurate design) -->
          <div class="flag-badge" aria-label="Bangladesh flag">
            <svg class="flag-svg" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg"><rect width="30" height="20" fill="#006a4e"/><circle cx="12" cy="10" r="5" fill="#f42a41"/></svg>
              <rect width="30" height="20" fill="#006a4e" />
              <circle cx="13" cy="10" r="4.5" fill="#f42a41" />
            </svg>
          </div>
        </div>
        <h1 class="name">{{ profile.name }}</h1>
        <span class="tagline">{{ profile.tagline }}</span>
      </div>

      <!-- CONTACT SECTION -->
      <div class="section-title">
        <i class="fas fa-phone-alt"></i> 
        <span>Instant contact</span>
      </div>
      <div class="contact-list">
        <a v-for="item in contactLinks" :key="item.id" class="contact-item" :href="item.url" target="_blank" rel="noopener noreferrer">
          <span class="contact-left">
            <span class="icon-bg"><i :class="item.icon"></i></span>
            <span class="contact-info">
              <span class="contact-label">{{ item.label }}</span>
              <span class="contact-detail">{{ item.detail }}</span>
            </span>
          </span>
          <span class="chevron"><i class="fas fa-chevron-right"></i></span>
        </a>
      </div>

      <!-- SOCIAL LINKS — ICON ONLY, ALWAYS SINGLE ROW -->
      <div class="section-title">
        <i class="fas fa-share-nodes"></i> 
        <span>Social Handles</span>
      </div>
      <div class="social-row">
        <a v-for="social in socialLinks" :key="social.brand" class="social-icon-link" :data-brand="social.brand" :href="social.url" target="_blank" rel="noopener noreferrer" :aria-label="social.label">
          <span class="social-icon-svg" v-html="social.svg"></span>
        </a>
      </div>

      <!-- FOOTER / THEME -->
      <div class="footer-actions">
        <div class="theme-switch">
          <button v-for="opt in themeOptions" :key="opt.value" class="theme-btn" :class="{ active: currentTheme === opt.value }" @click="setTheme(opt.value)">{{ opt.label }}</button>
        </div>
        <div class="copyright">© {{ currentYear }} {{ profile.name }}</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const { createApp, ref, onMounted, onUnmounted } = Vue;

      // ---------- MODEL (pure data) ----------
      const profileModel = {
        name: 'Md. Rafiur Rahman',
        tagline: 'Software Engineer · CSCA™',
        avatar: 'profilePicture.jpg',
        fallbackAvatar: 'https://ui-avatars.com/api/?background=0A84FF&color=fff&bold=true&name=Rafiur+Rahman'
      };

      const contactLinksModel = [
        { id: 'phone', label: 'Phone', detail: '+880 1728-054253', url: 'tel:+8801728054253', icon: 'fas fa-phone-alt' },
        { id: 'telegram', label: 'Telegram', detail: '@rr_uchchash360', url: 'https://t.me/rr_uchchash360', icon: 'fab fa-telegram-plane' },
        { id: 'whatsapp', label: 'WhatsApp', detail: 'Direct message', url: 'https://wa.me/8801728054253', icon: 'fab fa-whatsapp' },
        { id: 'messenger', label: 'Messenger', detail: 'rr.uchchash360', url: 'https://m.me/rr.uchchash360', icon: 'fab fa-facebook-messenger' },
        { id: 'email', label: 'Email', detail: 'rafiuruchchash@gmail.com', url: 'mailto:rafiuruchchash@gmail.com', icon: 'fas fa-envelope' }
      ];

      // Inline SVGs for social icons (icon-only, no labels)
      const fbSvg = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg>`;
      const igSvg = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>`;
      const liSvg = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>`;
      const xSvg = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`;

      const socialLinksModel = [
        { brand: 'facebook', label: 'Facebook', url: 'https://facebook.com/rr.uchchash360', svg: fbSvg },
        { brand: 'instagram', label: 'Instagram', url: 'https://instagram.com/rr.uchchash360', svg: igSvg },
        { brand: 'linkedin', label: 'LinkedIn', url: 'https://linkedin.com/in/rr-uchchash360', svg: liSvg },
        { brand: 'x', label: 'X', url: 'https://x.com/rr_uchchash360', svg: xSvg },
      ];

      const ThemeStorage = {
        KEY: 'rafiur-linkhub-theme',
        get: () => localStorage.getItem(ThemeStorage.KEY) || 'system',
        set: (val) => localStorage.setItem(ThemeStorage.KEY, val)
      };
      const getSystemTheme = () => window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

      const app = createApp({
        setup() {
          const profile = ref({ ...profileModel });
          const contactLinks = ref([...contactLinksModel]);
          const socialLinks = ref([...socialLinksModel]);
          const currentYear = ref(new Date().getFullYear());
          const currentTheme = ref('system');
          const themeOptions = [
            { value: 'light', label: 'Light' },
            { value: 'system', label: 'System' },
            { value: 'dark', label: 'Dark' }
          ];

          const applyTheme = (choice) => {
            const effective = choice === 'system' ? getSystemTheme() : choice;
            document.documentElement.setAttribute('data-theme', effective);
            document.documentElement.style.colorScheme = effective;
            currentTheme.value = choice;
          };
          const setTheme = (choice) => {
            ThemeStorage.set(choice);
            applyTheme(choice);
          };
          const handleAvatarError = (e) => {
            if (e.target.src !== profile.value.fallbackAvatar) {
              e.target.src = profile.value.fallbackAvatar;
            }
          };

          let mediaQuery;
          const systemListener = () => { if (currentTheme.value === 'system') applyTheme('system'); };
          
          onMounted(() => {
            applyTheme(ThemeStorage.get());
            mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            mediaQuery.addEventListener?.('change', systemListener) ?? mediaQuery.addListener?.(systemListener);
          });
          onUnmounted(() => {
            mediaQuery?.removeEventListener?.('change', systemListener) ?? mediaQuery?.removeListener?.(systemListener);
          });

          return {
            profile, contactLinks, socialLinks, currentYear, currentTheme, themeOptions,
            setTheme, handleAvatarError
          };
        }
      });

      app.mount('#app');
    })();
  </script>
</body>
</html>
