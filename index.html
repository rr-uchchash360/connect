<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="Connect — centralized hub for Md. Rafiur Rahman: instant contact, social channels, and professional presence." />
  <title>Connect — Md. Rafiur Rahman</title>
  
  <!-- ================= CUSTOM SVG FAVICON ================= -->
  <!-- Primary SVG favicon -->
  <link rel="icon" type="image/svg+xml"
  href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230071e3'/%3E%3Cpath d='M38 60L28 50a10 10 0 0114-14l10 10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M62 40l10 10a10 10 0 01-14 14l-10-10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- Real PNG fallback (recommended) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Light mode -->
  <link rel="icon" type="image/svg+xml" media="(prefers-color-scheme: light)"
  href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230071e3'/%3E%3Cpath d='M38 60L28 50a10 10 0 0114-14l10 10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M62 40l10 10a10 10 0 01-14 14l-10-10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- Dark mode -->
  <link rel="icon" type="image/svg+xml" media="(prefers-color-scheme: dark)"
  href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a84ff'/%3E%3Cpath d='M38 60L28 50a10 10 0 0114-14l10 10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M62 40l10 10a10 10 0 01-14 14l-10-10' fill='none' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- Vue 3 CDN for MVVM pattern -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root {
      --bg-1: #f5f5f7;
      --bg-2: #e9e9ee;
      --bg-3: rgba(255, 255, 255, 0.62);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(255, 255, 255, 0.55);
      --text: #1d1d1f;
      --text-soft: rgba(29, 29, 31, 0.62);
      --text-mute: rgba(29, 29, 31, 0.45);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.12);
      --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --accent-strong: #0060c7;
      --row-bg: rgba(255, 255, 255, 0.62);
      --row-bg-hover: rgba(255, 255, 255, 0.86);
      --row-border: rgba(60, 60, 67, 0.08);
      --pill-bg: rgba(255, 255, 255, 0.65);
      --pill-bg-hover: rgba(255, 255, 255, 0.9);
      --pill-border: rgba(60, 60, 67, 0.08);
      --focus: rgba(0, 113, 227, 0.35);
      --separator: rgba(60, 60, 67, 0.14);
      --blur: 28px;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      --max-width: 720px;
      --transition-fast: 160ms cubic-bezier(.2,.8,.2,1);
      --transition-med: 220ms cubic-bezier(.2,.8,.2,1);
    }

    [data-theme="dark"] {
      --bg-1: #0b0b0f;
      --bg-2: #12131a;
      --bg-3: rgba(28, 28, 30, 0.58);
      --panel: rgba(28, 28, 30, 0.66);
      --panel-strong: rgba(28, 28, 30, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f7;
      --text-soft: rgba(245, 245, 247, 0.68);
      --text-mute: rgba(245, 245, 247, 0.5);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.38);
      --accent: #0a84ff;
      --accent-strong: #409cff;
      --row-bg: rgba(28, 28, 30, 0.58);
      --row-bg-hover: rgba(44, 44, 48, 0.8);
      --row-border: rgba(255, 255, 255, 0.08);
      --pill-bg: rgba(28, 28, 30, 0.58);
      --pill-bg-hover: rgba(44, 44, 48, 0.8);
      --pill-border: rgba(255, 255, 255, 0.08);
      --focus: rgba(10, 132, 255, 0.45);
      --separator: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Inter, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-1), var(--bg-2));
      transition: background 0.2s ease;
      line-height: 1.4;
    }

    .page {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 40px);
      padding-bottom: calc(clamp(16px, 4vw, 40px) + env(safe-area-inset-bottom));
      animation: fadeIn 480ms cubic-bezier(0.2, 0.9, 0.4, 1) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shell {
      width: min(100%, var(--max-width));
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(var(--blur)) saturate(170%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(170%);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: background 0.2s ease, border-color 0.2s;
    }

    .content {
      padding: clamp(20px, 4vw, 36px);
      display: flex;
      flex-direction: column;
      gap: clamp(24px, 5vw, 32px);
    }

    .profile {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: var(--space-4);
    }

    .avatar-wrap {
      position: relative;
      width: clamp(96px, 18vw, 132px);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
      box-shadow: 0 12px 28px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: linear-gradient(145deg, #d4d4dd, #b0b0b8);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .avatar:hover .avatar-img {
      transform: scale(1.02);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(127, 127, 128, 0.12);
      border: 1px solid rgba(127, 127, 128, 0.14);
      color: var(--text-soft);
      font-size: 0.85rem;
      font-weight: 590;
      letter-spacing: -0.2px;
      backdrop-filter: blur(8px);
    }

    .name {
      margin: 0;
      font-size: clamp(1.85rem, 5vw, 2.25rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text), var(--accent-strong));
      background-clip: text;
      -webkit-background-clip: text;
      color: var(--text);
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      padding: 0 2px;
      color: var(--text-soft);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .section-title svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.7;
      fill: none;
    }

    .card {
      border-radius: var(--radius-lg);
      background: var(--panel-strong);
      border: 1px solid var(--panel-border);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(var(--blur)) saturate(160%);
    }

    .list {
      list-style: none;
    }

    .item + .item {
      border-top: 1px solid var(--separator);
    }

    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      width: 100%;
      padding: 14px 18px;
      color: var(--text);
      text-decoration: none;
      background: transparent;
      transition: background var(--transition-fast), transform var(--transition-fast);
      outline: none;
      min-height: 60px;
    }

    .link-row:hover,
    .link-row:focus-visible {
      background: var(--row-bg-hover);
    }

    .link-row:active {
      transform: scale(0.98);
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(0,113,227,0.12), rgba(0,113,227,0.05));
      border: 0.5px solid rgba(0,113,227,0.2);
      color: var(--accent);
    }

    [data-theme="dark"] .icon {
      background: rgba(10,132,255,0.15);
    }

    .row-text {
      display: grid;
      gap: 2px;
    }

    .row-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .row-subtitle {
      font-size: 0.82rem;
      color: var(--text-mute);
      line-height: 1.25;
    }

    .chevron {
      color: var(--text-mute);
      font-size: 1.6rem;
      font-weight: 300;
      transition: transform var(--transition-fast);
    }

    .link-row:hover .chevron,
    .link-row:focus-visible .chevron {
      transform: translateX(3px);
    }

    .social-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .social-pure {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 52px;
      padding: 12px 24px;
      transition: transform 0.18s ease, background var(--transition-fast), box-shadow 0.2s;
      text-decoration: none;
      outline: none;
      box-shadow: 0 5px 12px rgba(0,0,0,0.05);
    }

    .social-pure:hover,
    .social-pure:focus-visible {
      background: var(--pill-bg-hover);
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 12px 22px rgba(0,0,0,0.1);
    }

    .social-pure:active {
      transform: translateY(1px);
    }

    .social-pure svg {
      width: 24px;
      height: 24px;
      display: block;
      color: currentColor;
      transition: color 0.2s;
    }

    .social-pure[data-brand="facebook"]:hover svg { color: #1877f2; }
    .social-pure[data-brand="instagram"]:hover svg { color: #e4405f; }
    .social-pure[data-brand="x"]:hover svg { color: #000000; }
    .social-pure[data-brand="linkedin"]:hover svg { color: #0a66c2; }

    [data-theme="dark"] .social-pure[data-brand="facebook"]:hover svg { color: #3b82f6; }
    [data-theme="dark"] .social-pure[data-brand="instagram"]:hover svg { color: #f56040; }
    [data-theme="dark"] .social-pure[data-brand="x"]:hover svg { color: #ffffff; }
    [data-theme="dark"] .social-pure[data-brand="linkedin"]:hover svg { color: #409eff; }

    .footer {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--separator), transparent);
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      color: var(--text-soft);
      font-size: 0.85rem;
    }

    .copyright {
      order: 1;
    }
    .theme-switcher {
      order: 2;
      display: inline-flex;
      padding: 4px;
      border-radius: 100px;
      background: rgba(127, 127, 128, 0.12);
      border: 1px solid rgba(127, 127, 128, 0.12);
      gap: 6px;
    }

    .theme-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 590;
      cursor: pointer;
      transition: all 0.14s ease;
      font-family: inherit;
    }

    .theme-btn:hover,
    .theme-btn:focus-visible {
      color: var(--text);
      background: rgba(255,255,255,0.2);
    }

    .theme-btn[aria-pressed="true"] {
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .focus-ring:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus);
      border-radius: 12px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 0;
      }
      .shell {
        width: 100%;
        min-height: 100svh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        border-top: 0;
        backdrop-filter: blur(20px);
        background: var(--bg-3);
      }
      .content {
        padding: 24px 18px 32px;
      }
      .link-row {
        padding: 14px 12px;
      }
      .social-pure {
        padding: 10px 20px;
      }
      .social-pure svg {
        width: 22px;
        height: 22px;
      }
      .footer-row {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 12px;
      }
      .copyright {
        order: 1;
        text-align: center;
        width: 100%;
      }
      .theme-switcher {
        order: 2;
        justify-content: space-between;
        width: 100%;
        max-width: 280px;
      }
      .theme-btn {
        flex: 1;
        text-align: center;
        padding: 8px 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="page">
      <section class="shell" aria-label="Link Heaven: central profile hub">
        <div class="content">
          <!-- Profile Section - bound to ViewModel data -->
          <header class="profile">
            <div class="avatar-wrap" aria-label="Profile picture">
              <div class="avatar">
                <img 
                  class="avatar-img" 
                  :src="profile.avatarSrc" 
                  :alt="profile.name + ' profile photo'" 
                  @error="handleImageError"
                >
              </div>
            </div>
            <div class="tag">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M8 6L3 12L8 18"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M16 6L21 12L16 18"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              {{ profile.role }}
            </div>
            <h1 class="name">{{ profile.name }}, {{ profile.credential }}</h1>
          </header>

          <!-- Contact Section with dynamic list from ViewModel -->
          <section class="section" aria-labelledby="contact-heading">
            <h2 class="section-title" id="contact-heading">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Instant Contact
            </h2>
            <div class="card">
              <ul class="list">
                <li class="item" v-for="contact in contactItems" :key="contact.id">
                  <a class="link-row focus-ring" :href="contact.href" target="_blank" rel="noopener noreferrer" :aria-label="contact.ariaLabel">
                    <span class="row-left">
                      <span class="icon" aria-hidden="true" v-html="contact.iconSvg"></span>
                      <span class="row-text">
                        <span class="row-title">{{ contact.title }}</span>
                        <span class="row-subtitle">{{ contact.subtitle }}</span>
                      </span>
                    </span>
                    <span class="chevron" aria-hidden="true">›</span>
                  </a>
                </li>
              </ul>
            </div>
          </section>

          <!-- Social Section -->
          <section class="section" aria-labelledby="social-heading">
            <h2 class="section-title" id="social-heading">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Social
            </h2>
            <div class="social-wrap">
              <a 
                v-for="social in socialLinks" 
                :key="social.brand"
                class="social-pure focus-ring" 
                :href="social.url" 
                target="_blank" 
                rel="noopener noreferrer" 
                :data-brand="social.brand" 
                :aria-label="social.ariaLabel"
                v-html="social.iconSvg"
              ></a>
            </div>
          </section>

          <!-- Footer with dynamic year and theme binding -->
          <footer class="footer">
            <div class="separator" aria-hidden="true"></div>
            <div class="footer-row">
              <div class="copyright">© {{ profile.name }} {{ currentYear }}</div>
              <div class="theme-switcher" role="tablist" aria-label="Theme preference">
                <button 
                  v-for="option in themeOptions" 
                  :key="option.value"
                  class="theme-btn" 
                  type="button" 
                  :data-theme-choice="option.value"
                  :aria-pressed="currentTheme === option.value"
                  @click="setTheme(option.value)"
                >{{ option.label }}</button>
              </div>
            </div>
          </footer>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ---------- MVVM Architecture: Model, ViewModel, View binding with Vue 3 ----------
    // Model: Data structures and business logic (pure data + theme utilities)
    const ProfileModel = {
      name: 'Md. Rafiur Rahman',
      credential: 'CSCA™',
      role: 'Software Engineer',
      avatarSrc: 'profilePicture.jpg',
      fallbackAvatar: 'https://ui-avatars.com/api/?background=0A84FF&color=fff&name=Rafiur+Rahman'
    };

    const ContactModel = [
      {
        id: 'phone',
        title: 'Phone',
        subtitle: '+880 1728-054253',
        href: 'tel:+8801728054253',
        ariaLabel: 'Call Rafiur via phone',
        iconSvg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.7 5.1 6.5 6.5l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V21c0 .6-.4 1-1 1C10.1 22 2 13.9 2 3c0-.6.4-1 1-1h3.6c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1l-2.3 2.9Z"/></svg>'
      },

      {
        id: 'telegram',
        title: 'Telegram',
        subtitle: '@rr_uchchash360',
        href: 'https://t.me/rr_uchchash360',
        ariaLabel: 'Message on Telegram',
        iconSvg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9.04 15.47 8.9 20c.43 0 .62-.18.84-.4l2.02-1.94 4.18 3.06c.77.43 1.32.2 1.52-.72l2.76-12.94h.01c.24-1.11-.4-1.54-1.15-1.26L3.3 9.5c-1.08.42-1.06 1.02-.18 1.3l4.6 1.44L17.9 6.2c.48-.3.92-.13.56.17"/></svg>'
      },

      {
        id: 'whatsapp',
        title: 'WhatsApp',
        subtitle: 'Direct message',

    // Theme service (Model helper)
    const ThemeService = {
      STORAGE_KEY: 'link-heaven-theme-v2',
      getSystemTheme: () => window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      getSaved: () => localStorage.getItem(ThemeService.STORAGE_KEY) || 'system',
      save: (theme) => localStorage.setItem(ThemeService.STORAGE_KEY, theme),
      applyThemeToDOM: (effectiveTheme) => {
        document.documentElement.setAttribute('data-theme', effectiveTheme);
        document.documentElement.style.colorScheme = effectiveTheme;
      }
    };

    // ViewModel: Vue reactive component
    const { createApp, ref, computed, onMounted } = Vue;

    const app = createApp({
      setup() {
        // Reactive state for UI
        const currentTheme = ref('system');
        const currentYear = ref(new Date().getFullYear());
        
        // Profile data (exposed to template)
        const profile = ref({ ...ProfileModel });
        const contactItems = ref([...ContactModel]);
        const socialLinks = ref([...SocialModel]);
        const themeOptions = ref([
          { value: 'light', label: 'Light' },
          { value: 'system', label: 'System' },
          { value: 'dark', label: 'Dark' }
        ]);

        // Helper: compute effective theme and apply
        const applyTheme = (choice) => {
          const effective = choice === 'system' ? ThemeService.getSystemTheme() : choice;
          ThemeService.applyThemeToDOM(effective);
          currentTheme.value = choice;
        };

        // Set theme (public method)
        const setTheme = (choice) => {
          ThemeService.save(choice);
          applyTheme(choice);
        };

        // Handle image error: fallback to UI avatar
        const handleImageError = (event) => {
          const img = event.target;
          if (img.src !== profile.value.fallbackAvatar) {
            img.src = profile.value.fallbackAvatar;
          }
        };

        // System theme change listener
        const handleSystemChange = () => {
          if (currentTheme.value === 'system') {
            applyTheme('system');
          }
        };

        onMounted(() => {
          // Restore saved theme
          const saved = ThemeService.getSaved();
          applyTheme(saved);
          
          // Listen to system preference changes
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          if (mediaQuery.addEventListener) {
            mediaQuery.addEventListener('change', handleSystemChange);
          } else if (mediaQuery.addListener) {
            mediaQuery.addListener(handleSystemChange);
          }
        });

        return {
          profile,
          contactItems,
          socialLinks,
          themeOptions,
          currentTheme,
          currentYear,
          setTheme,
          handleImageError
        };
      }
    });

    app.mount('#app');
